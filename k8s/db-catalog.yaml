apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-db
  template:
    metadata:
      labels:
        app: catalog-db
    spec:
      containers:
        - name: postgres
          image: postgres:17.4-alpine3.20
          env:
            - name: POSTGRES_PASSWORD
              value: "password"
            - name: POSTGRES_DB
              value: "catalogdb"
            - name: POSTGRES_USER
              value: "postgres" 
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-db-svc
spec:
  selector:
    app: catalog-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432