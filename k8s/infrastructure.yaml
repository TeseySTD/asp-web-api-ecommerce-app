# RabbitMQ (Message Broker)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eccomerce-mq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13.7-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672 # Management UI
---
apiVersion: v1
kind: Service
metadata:
  name: eccomerce-mq 
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
---
# Redis (Distributed Cache)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: distributed-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: distributed-cache 
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379